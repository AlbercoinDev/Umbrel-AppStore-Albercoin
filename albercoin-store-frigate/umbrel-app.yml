manifestVersion: 1.1
id: albercoin-store-frigate
category: bitcoin
name: Frigate
version: "1.5.2"
tagline: Silent Payments Electrum server
description: >-
  Frigate is an Electrum server for Bitcoin Silent Payments (BIP352).
  It indexes Silent Payments tweak data from Bitcoin Core and serves clients
  over the Electrum JSON-RPC protocol.


  This Umbrel package includes a management interface inspired by Electrs,
  connection details for local and Tor access, a first-run setup flow, progress
  tracking, logs, and advanced performance configuration.
developer: Sparrow Wallet
website: https://github.com/sparrowwallet/frigate
dependencies:
  - bitcoin
  - electrs
repo: https://github.com/sparrowwallet/frigate
support: https://github.com/sparrowwallet/frigate/issues
port: 2107
gallery: []
path: ""
defaultUsername: ""
defaultPassword: ""
releaseNotes: >-
  Initial Umbrel package for Frigate with first-run configuration, local/Tor
  connection details, indexing progress, logs, and advanced settings.
submitter: AlbercoinDev
submission: https://github.com/AlbercoinDev/Umbrel-AppStore-Albercoin
backupIgnore:
  - data/frigate/db
