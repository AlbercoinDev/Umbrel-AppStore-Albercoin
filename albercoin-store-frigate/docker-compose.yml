version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: $APP_FRIGATE_WEB_IP
      APP_PORT: 80

  web:
    image: nginx:1.27-alpine
    restart: on-failure
    command: |
      sh -c '
      while true; do
        network="$${APP_BITCOIN_NETWORK:-mainnet}"
        if [ "$${network}" = "mainnet" ]; then
          log_file="/data/frigate/frigate.log"
        else
          log_file="/data/frigate/$${network}/frigate.log"
        fi

        status="Starting"
        detail="Waiting for Frigate to write its first log entries."
        if [ -f "$${log_file}" ]; then
          recent="$$(tail -n 120 "$${log_file}" 2>/dev/null || true)"
          if printf "%s" "$${recent}" | grep -qi "Electrum server listening"; then
            status="Ready"
            detail="Frigate is indexed and accepting Electrum connections."
          elif printf "%s" "$${recent}" | grep -qi "ERROR"; then
            status="Needs attention"
            detail="Frigate reported an error. Check the log below."
          else
            status="Indexing / syncing"
            detail="Frigate is building or updating its Silent Payments index. It will be ready when the log says Electrum server listening."
          fi
          log_html="$$(tail -n 35 "$${log_file}" 2>/dev/null | sed "s/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g" || true)"
        else
          log_html="No Frigate log found yet. The service may still be installing dependencies or downloading Frigate."
        fi

        generated_at="$$(date -u "+%Y-%m-%d %H:%M:%S UTC")"
        cat > /usr/share/nginx/html/index.html <<EOF
      <!doctype html>
      <html lang="en">
      <head>
        <meta charset="utf-8">
        <meta http-equiv="refresh" content="10">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Frigate on Umbrel</title>
        <style>
          body { margin: 0; min-height: 100vh; background: #0b1020; color: #eaf6ff; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; display: grid; place-items: center; padding: 28px 0; }
          main { width: min(900px, calc(100% - 40px)); padding: 42px; border-radius: 28px; background: linear-gradient(145deg, rgba(255,255,255,.12), rgba(255,255,255,.04)); box-shadow: 0 24px 80px rgba(0,0,0,.35); }
          h1 { margin: 0 0 12px; font-size: clamp(34px, 7vw, 64px); line-height: 1; }
          p { color: #c6d8e8; font-size: 18px; line-height: 1.6; }
          code { background: rgba(92,200,255,.14); border: 1px solid rgba(92,200,255,.32); color: #9ee3ff; padding: 3px 8px; border-radius: 8px; }
          .card { margin-top: 22px; padding: 22px; border-radius: 18px; background: rgba(0,0,0,.22); }
          .status { display: inline-flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: 999px; background: rgba(92,200,255,.14); border: 1px solid rgba(92,200,255,.32); color: #9ee3ff; font-weight: 700; }
          .dot { width: 10px; height: 10px; border-radius: 999px; background: #5cc8ff; box-shadow: 0 0 18px #5cc8ff; }
          dl { display: grid; grid-template-columns: 170px 1fr; gap: 10px 18px; margin: 0; color: #c6d8e8; }
          dt { color: #8fb0c8; }
          dd { margin: 0; }
          pre { overflow: auto; white-space: pre-wrap; color: #cfeeff; background: rgba(0,0,0,.35); border: 1px solid rgba(255,255,255,.1); border-radius: 14px; padding: 16px; max-height: 360px; font-size: 13px; line-height: 1.45; }
        </style>
      </head>
      <body>
        <main>
          <h1>Frigate</h1>
          <div class="status"><span class="dot"></span>$${status}</div>
          <p>$${detail}</p>
          <div class="card">
            <dl>
              <dt>Electrum TCP port</dt><dd><code>$${APP_FRIGATE_ELECTRUM_PORT:-50005}</code></dd>
              <dt>Bitcoin network</dt><dd><code>$${network}</code></dd>
              <dt>Start block</dt><dd><code>950000</code></dd>
              <dt>Log file</dt><dd><code>$${log_file}</code></dd>
              <dt>Updated</dt><dd>$${generated_at}</dd>
            </dl>
          </div>
          <div class="card">
            <p>Latest Frigate log lines:</p>
            <pre>$${log_html}</pre>
          </div>
        </main>
      </body>
      </html>
      EOF
        sleep 5
      done &
      nginx -g "daemon off;"'
    volumes:
      - ${APP_DATA_DIR}/data/frigate:/data/frigate:ro
    environment:
      APP_BITCOIN_NETWORK: "${APP_BITCOIN_NETWORK}"
      APP_FRIGATE_ELECTRUM_PORT: "${APP_FRIGATE_ELECTRUM_PORT}"
    networks:
      default:
        ipv4_address: $APP_FRIGATE_WEB_IP

  frigate:
    image: debian:bookworm-slim
    restart: always
    stop_grace_period: 2m
    command: |
      sh -c '
      set -eu
      FRIGATE_VERSION="$${APP_VERSION:-1.5.2}"
      runtime_dir="/data/frigate/runtime"
      apt-get update
      DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends ca-certificates curl tar
      rm -rf /var/lib/apt/lists/*
      arch="$$(dpkg --print-architecture)"
      case "$${arch}" in
        amd64) frigate_arch="x86_64"; frigate_sha256="4e0f9b0ba90d07354859b7fa29f14deb5c01bd1b4c3449e657e7c0b4dddf667d" ;;
        arm64) frigate_arch="aarch64"; frigate_sha256="dc7aa026f78f0365d08d04358562a19d961bd7cbdfd862f2ec4a0fb5f3fe0413" ;;
        *) echo "Unsupported architecture: $${arch}" >&2; exit 1 ;;
      esac
      install_dir="$${runtime_dir}/frigate-$${FRIGATE_VERSION}-$${frigate_arch}"
      if [ ! -x "$${install_dir}/bin/frigate" ]; then
        tmp_file="/tmp/frigate.tar.gz"
        rm -rf "$${install_dir}"
        mkdir -p "$${install_dir}"
        curl -fsSL -o "$${tmp_file}" "https://github.com/sparrowwallet/frigate/releases/download/$${FRIGATE_VERSION}/frigate-$${FRIGATE_VERSION}-$${frigate_arch}.tar.gz"
        echo "$${frigate_sha256}  $${tmp_file}" | sha256sum -c -
        tar -xzf "$${tmp_file}" -C "$${install_dir}" --strip-components=1
        rm -f "$${tmp_file}"
      fi
      network="$${APP_BITCOIN_NETWORK:-mainnet}"
      home_dir="/data/frigate"
      config_dir="$${home_dir}"
      network_args=""
      if [ "$${network}" != "mainnet" ]; then
        config_dir="$${home_dir}/$${network}"
        network_args="-n $${network}"
      fi
      mkdir -p "$${config_dir}"
      desired_start_height="950000"
      start_height_marker="$${config_dir}/.umbrel-start-height"
      if [ "$$(cat "$${start_height_marker}" 2>/dev/null || true)" != "$${desired_start_height}" ]; then
        rm -rf "$${config_dir}/db"
        printf "%s" "$${desired_start_height}" > "$${start_height_marker}"
      fi
      cat > "$${config_dir}/config.toml" <<EOF
      [core]
      connect = true
      server = "http://$${APP_BITCOIN_NODE_IP}:$${APP_BITCOIN_RPC_PORT}"
      authType = "USERPASS"
      auth = "$${APP_BITCOIN_RPC_USER}:$${APP_BITCOIN_RPC_PASS}"
      zmqSequenceEndpoint = "tcp://$${APP_BITCOIN_NODE_IP}:$${APP_BITCOIN_ZMQ_SEQUENCE_PORT}"

      [index]
      startHeight = $${desired_start_height}
      cacheSize = "10M"

      [scan]
      computeBackend = "AUTO"

      [server]
      tcp = "tcp://0.0.0.0:$${APP_FRIGATE_ELECTRUM_PORT}"
      backendElectrumServer = "tcp://$${APP_ELECTRS_NODE_IP}:$${APP_ELECTRS_NODE_PORT}"
      EOF
      exec "$${install_dir}/bin/frigate" -d "$${home_dir}" $${network_args}
      '
    volumes:
      - ${APP_DATA_DIR}/data/frigate:/data/frigate
    environment:
      APP_VERSION: "${APP_VERSION}"
      APP_BITCOIN_NETWORK: "${APP_BITCOIN_NETWORK}"
      APP_BITCOIN_NODE_IP: "${APP_BITCOIN_NODE_IP}"
      APP_BITCOIN_RPC_PORT: "${APP_BITCOIN_RPC_PORT}"
      APP_BITCOIN_RPC_USER: "${APP_BITCOIN_RPC_USER}"
      APP_BITCOIN_RPC_PASS: "${APP_BITCOIN_RPC_PASS}"
      APP_BITCOIN_ZMQ_SEQUENCE_PORT: "${APP_BITCOIN_ZMQ_SEQUENCE_PORT}"
      APP_ELECTRS_NODE_IP: "${APP_ELECTRS_NODE_IP}"
      APP_ELECTRS_NODE_PORT: "${APP_ELECTRS_NODE_PORT}"
      APP_FRIGATE_ELECTRUM_PORT: "${APP_FRIGATE_ELECTRUM_PORT}"
    ports:
      - "${APP_FRIGATE_ELECTRUM_PORT}:${APP_FRIGATE_ELECTRUM_PORT}"
    networks:
      default:
        ipv4_address: $APP_FRIGATE_IP

  tor:
    image: getumbrel/tor:0.4.7.8@sha256:2ace83f22501f58857fa9b403009f595137fa2e7986c4fda79d82a8119072b6a
    user: "1000:1000"
    restart: on-failure
    volumes:
      - ${APP_DATA_DIR}/torrc:/etc/tor/torrc:ro
      - ${TOR_DATA_DIR}:/data
    environment:
      HOME: "/tmp"
    networks:
      default:
        ipv4_address: $APP_FRIGATE_TOR_IP
