manifestVersion: 1
id: albercoin-store-frigate
category: bitcoin
name: Frigate
version: "1.5.2-5"
tagline: Silent Payments Electrum server for Sparrow Wallet
description: >-
  Frigate is an experimental Electrum-style server that enables Silent Payments
  (BIP352) scanning for light clients like Sparrow Wallet.


  It connects to your Bitcoin Node and builds a local tweak index using DuckDB,
  then exposes Electrum-compatible methods for Silent Payments wallets to
  subscribe and scan for incoming transactions without downloading gigabytes of
  block filter data.


  Built by sparrowwallet (Craig Raw). Requires the Bitcoin Node app to be
  installed and synced. Initial indexing can take hours on mainnet (CPU-only)
  but is fast on signet/testnet.


  Configuration settings are available at the app's settings page,
  where you can tune compute backend (CPU/GPU/AUTO), cache size,
  memory limits, and thread count for your machine's capacity.
releaseNotes: >-
  Configuration settings page now available at /settings.html.
  You can now tune Frigate for your machine's capacity: GPU
  acceleration (set FRIGATE_COMPUTE_BACKEND to AUTO for machines
  with a GPU), cache size, DuckDB memory limit, CPU thread limit,
  and more — all configurable via environment variables.
