version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: onion-rotator-web
      APP_PORT: 8900

  server:
    image: python:3.12-slim
    hostname: onion-rotator-web
    init: true
    user: "0:0"
    restart: on-failure
    stop_grace_period: 30s
    working_dir: /app
    command: python main.py
    volumes:
      - ${APP_DATA_DIR}/src:/app:ro
      - ${UMBREL_ROOT}/tor/data:/tor-data:rw
      - /var/run/docker.sock:/var/run/docker.sock:rw
    environment:
      UMBREL_ROOT: ${UMBREL_ROOT}
      TOR_DATA_DIR: /tor-data
      ONION_ROTATOR_DRY_RUN: "false"
      ONION_ROTATOR_DEBUG: "false"
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
