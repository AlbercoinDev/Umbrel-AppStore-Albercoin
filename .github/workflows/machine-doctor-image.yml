name: Build Machine Doctor image

on:
  push:
    branches:
      - master
    paths:
      - "albercoin-store-machine-doctor/**"
      - ".github/workflows/machine-doctor-image.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./albercoin-store-machine-doctor
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/albercoindev/machine-doctor:0.1.8
            ghcr.io/albercoindev/machine-doctor:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
