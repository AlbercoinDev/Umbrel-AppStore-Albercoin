manifestVersion: 1
id: albercoin-store-frigate
category: bitcoin
name: Frigate
version: "1.5.2-6"
tagline: Silent Payments Electrum server for Sparrow Wallet
description: >-
  Frigate is an experimental Electrum-style server that enables Silent Payments
  (BIP352) scanning for light clients like Sparrow Wallet.

  It connects to your Bitcoin Node and builds a local tweak index using DuckDB,
  then exposes Electrum-compatible methods for Silent Payments wallets to
  subscribe and scan for incoming transactions without downloading gigabytes of
  block filter data.

  This Umbrel package includes a local configuration panel to tune indexing
  performance, CPU/RAM usage, cache size, DuckDB memory limit, scan batch size,
  compute backend and server limits without editing files over SSH.
releaseNotes: >-
  Add Frigate performance configuration panel. You can now edit cache size,
  compute backend, database threads, DuckDB memory limit, scan batch size,
  RPC batch size and subscription limits from the web UI, then restart only
  the Frigate server container to apply the new config.toml values.
